# configs/config.yaml

# CONFIGURATION FILE

app:
  env: "dev"

server:
  port: 8080

workers:
  grpc_max_threads: 10    # Python ThreadPoolExecutor size
  addresses:
    - "localhost:50051"   # Worker 1
    - "localhost:50052"   # Worker 2
    - "localhost:50053"   # Worker 3

storage:
  type: "s3"
  endpoint: "http://localhost:9000"     # URL MinIO/AWS (TEMPORARY)
  access_key: "minioadmin"              # Credentials
  secret_key: "minioadmin"
  bucket: "example-storage"             # Name of the shared storage
  local_temp_dir: "worker_temp_data"    # Temp dir for workers (each Worker is identified using its port)
  base_path_prefix: "models/"           # S3 folder prefix

# Task Configuration
tasks:
  - name: "iris-classification"
    type: "classification"
    dataset_path: "data/iris.csv"
    target_column: "Species"
    hyperparameters:
      n_estimators: 10
      max_depth: 5
    # Quick test for prediction
    test_features: [5.0, 3.6, 1.4, 0.2]

  - name: "housing-regression"
    type: "regression"
    dataset_path: "data/housing.csv"
    target_column: "median_house_value"
    hyperparameters:
      n_estimators: 15
      max_depth: 10
    # Quick test for prediction
    test_features: [-122.23, 37.88, 41.0, 880.0, 129.0, 322.0, 126.0, 8.3252]

# Timeouts & Limits
system:
  timeout_training_seconds: 60
  timeout_prediction_seconds: 5
  timeout_health_check_seconds: 2