syntax = "proto3";

package worker.v1;

option go_package = "github.com/bytelisa/distributed-random-forest/api/proto/worker/v1;workerv1";

enum TaskType {
  UNSPECIFIED_TASK = 0;
  CLASSIFICATION_TASK = 1;
  REGRESSION_TASK = 2;
}


// EXPORTED SERVICES

service Worker {
  // Start training a subset of trees
  rpc Train (TrainRequest) returns (TrainResponse);

  // Inference on given input
  rpc Predict (PredictRequest) returns (PredictResponse);

  // Health check for fault tolerance
  rpc Health (HealthRequest) returns (HealthResponse);
}


// MESSAGES

message TrainRequest {
  string model_id = 1;
  string dataset_url = 2;
  TaskType task_type = 3;

  // RandomForest hyperparameters
  int32 n_estimators = 4;
  int32 max_depht = 5;

  string target_column = 6;

  // Necessary for uncorrelated forests
  int32 random_seed = 7;

}

message TrainResponse {
  bool success = 1;
  string message = 2;
}

message PredictRequest {
  string model_id = 1;
  repeated float features = 2;

  // fields necessary to partition trained trees between the workers
  int32 worker_index = 3;  // Indice del worker (0, 1, 2...)
  int32 total_workers = 4; // Totale worker attivi
}

message PredictResponse {
  // Changed from single string to repeated to allow master-side global aggregation
  repeated string predictions = 1;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
}